name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra tag (example: v1-release)"
        required: false
        default: ""
      sync_local:
        description: "Pull latest image on a self-hosted runner"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/mynginx_image1
  BUILD_CONTEXT_PATH: ./04-Build-new-Docker-Image-and-Run-and-Push-to-DockerHub/Nginx-DockerFiles
  DOCKERFILE_PATH: ./04-Build-new-Docker-Image-and-Run-and-Push-to-DockerHub/Nginx-DockerFiles/Dockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" || -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required."
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose image tags
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
        shell: bash
        run: |
          set -euo pipefail

          image="${IMAGE_REPO}"
          short_sha="${GITHUB_SHA::7}"
          branch_tag="$(echo "${GITHUB_REF_NAME}" | sed -E 's/[^a-zA-Z0-9_.-]+/-/g')"
          tags="${image}:sha-${short_sha},${image}:${branch_tag}"

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            tags="${tags},${image}:latest"
          fi

          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            tags="${tags},${image}:${INPUT_IMAGE_TAG}"
          fi

          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT_PATH }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync-local-docker:
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_local == 'true' }}
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull image to local Docker engine
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            tag="${INPUT_IMAGE_TAG}"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            tag="latest"
          else
            tag="$(echo "${GITHUB_REF_NAME}" | sed -E 's/[^a-zA-Z0-9_.-]+/-/g')"
          fi

          image="${IMAGE_REPO}:${tag}"
          docker pull "${image}"
          docker image ls "${IMAGE_REPO}"
